name: shoo
description: SHOO — Shein-style Flutter e-commerce app (Mock backend).
publish_to: 'none'
version: 0.4.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.8.0+1
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  path_provider: ^2.1.5
  intl: ^0.20.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  connectivity_plus: ^6.1.4
  permission_handler: ^11.4.0
  share_plus: ^10.1.4
  image_picker: ^1.1.2
  app_links: ^6.4.0
  package_info_plus: ^8.3.0
  url_launcher: ^6.3.1
  video_player: ^2.9.3
  pdfx: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.5
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  macos:
    generate: true
  web:
    generate: true
    background_color: "#222222"
    theme_color: "#FF4657"
  image_path: assets/brand/app_icon.png
  adaptive_icon_background: "#222222"
  adaptive_icon_foreground: assets/brand/app_icon.png

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/mock/
    - assets/brand/
